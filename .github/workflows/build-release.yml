name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      plugin_id:
        description: Plugin directory name under plugins/
        required: true
        default: cpa-manager-plus
        type: choice
        options:
          - cpa-manager-plus
          - developer-role-normalizer
      release_tag:
        description: Git tag for the release (e.g. v0.1.0-cpa-manager-plus)
        required: true
        default: v0.1.0-cpa-manager-plus

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      plugin_id: ${{ steps.out.outputs.plugin_id }}
      release_tag: ${{ steps.out.outputs.release_tag }}
    steps:
      - id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "plugin_id=${{ inputs.plugin_id }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "plugin_id=developer-role-normalizer" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ needs.resolve.outputs.plugin_id }} ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll
          - goos: windows
            goarch: arm64
            runner: windows-11-arm
            ext: dll

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Update go.mod replace path
        working-directory: plugins/${{ needs.resolve.outputs.plugin_id }}/go
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"
          sed -i.bak "s|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${WORKSPACE}/CLIProxyAPI|" go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin
        working-directory: plugins/${{ needs.resolve.outputs.plugin_id }}/go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') && 'clang' || '' }}
        run: |
          PLUGIN_ID="${{ needs.resolve.outputs.plugin_id }}"
          TAG="${{ needs.resolve.outputs.release_tag }}"
          VERSION="${TAG#v}"
          # strip optional -plugin-id suffix from version for artifact naming
          VERSION="${VERSION%%-*}"
          OUTPUT="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -buildmode=c-shared -ldflags="-extldflags=-Wl,--export-all-symbols" -o "$OUTPUT" .
          else
            go build -buildmode=c-shared -o "$OUTPUT" .
          fi
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ needs.resolve.outputs.plugin_id }}/go
        shell: bash
        run: |
          PLUGIN_ID="${{ needs.resolve.outputs.plugin_id }}"
          TAG="${{ needs.resolve.outputs.release_tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          LIB="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$ZIP_NAME" "$LIB"
          else
            zip -j "$ZIP_NAME" "$LIB"
          fi
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          else
            sha256sum "$ZIP_NAME" >> checksums_fragment.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ needs.resolve.outputs.plugin_id }}/go/*.zip
            plugins/${{ needs.resolve.outputs.plugin_id }}/go/checksums_fragment.txt

  release:
    name: Assemble Release
    runs-on: ubuntu-latest
    needs: [resolve, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          cat checksums.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            checksums.txt