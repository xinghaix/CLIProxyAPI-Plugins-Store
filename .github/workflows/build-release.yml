# Tag is pushed manually after bumping registry.json + main.pluginVersion in source.
# Tag format is v<version>-<plugin-id>, for example v1.2.0-cpa-manager-plus.
# One tag builds and releases exactly one plugin under plugins/<plugin-id>/go.
# CPA uses GET .../releases/latest on registry.repository and selects
#   <plugin-id>_<version>_<goos>_<goarch>.zip from release assets.

name: Build and Release Plugin

on:
  push:
    tags:
      - "v[0-9]*-*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.list.outputs.version }}
      plugin_id: ${{ steps.list.outputs.plugin_id }}
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_BODY="${TAG#v}"
          if [ "$TAG_BODY" = "$TAG" ]; then
            echo "invalid tag for CPA plugin store: $TAG (need v<version>-<plugin-id>, e.g. v1.2.0-cpa-manager-plus)" >&2
            exit 1
          fi

          PLUGINS=$(find plugins -type f -path '*/go/go.mod' | sed 's|/go/go.mod$||;s|^plugins/||' | sort -u)
          if [ -z "$PLUGINS" ]; then
            echo "no plugins under plugins/*/go" >&2
            exit 1
          fi

          PLUGIN_ID=""
          VERSION=""
          # Plugin IDs may contain hyphens, so match the longest known plugin id suffix.
          SORTED_PLUGINS=$(printf '%s\n' "$PLUGINS" | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2-)
          for pid in $SORTED_PLUGINS; do
            suffix="-${pid}"
            if [[ "$TAG_BODY" == *"$suffix" ]]; then
              PLUGIN_ID="$pid"
              VERSION="${TAG_BODY%$suffix}"
              break
            fi
          done

          if [ -z "$PLUGIN_ID" ] || [ -z "$VERSION" ]; then
            echo "invalid tag for CPA plugin store: $TAG" >&2
            echo "expected v<version>-<plugin-id>, where plugin-id is one of: $(printf '%s' "$PLUGINS" | tr '\n' ' ')" >&2
            exit 1
          fi
          if [ ! -f "plugins/${PLUGIN_ID}/go/go.mod" ]; then
            echo "plugin not found: ${PLUGIN_ID}" >&2
            exit 1
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+][0-9A-Za-z.-]+)?$'; then
            echo "invalid version in tag: $VERSION (need semver like 1.2.0; prerelease '-' is reserved for plugin-id suffix)" >&2
            exit 1
          fi

          MATRIX=$(jq -nc --arg pid "$PLUGIN_ID" '
            {include: [
              {plugin_id:$pid,goos:"linux",goarch:"amd64",runner:"ubuntu-latest",ext:"so"},
              {plugin_id:$pid,goos:"linux",goarch:"arm64",runner:"ubuntu-24.04-arm",ext:"so"},
              {plugin_id:$pid,goos:"darwin",goarch:"amd64",runner:"macos-latest",ext:"dylib"},
              {plugin_id:$pid,goos:"darwin",goarch:"arm64",runner:"macos-latest",ext:"dylib"},
              {plugin_id:$pid,goos:"windows",goarch:"amd64",runner:"windows-latest",ext:"dll"},
              {plugin_id:$pid,goos:"windows",goarch:"arm64",runner:"windows-11-arm",ext:"dll"}
            ]}
          ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_id=$PLUGIN_ID" >> "$GITHUB_OUTPUT"
          {
            echo 'matrix<<MATRIX_EOF'
            echo "$MATRIX"
            echo 'MATRIX_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Plugin: $PLUGIN_ID version $VERSION jobs: $(echo "$MATRIX" | jq '.include | length')"

  build:
    name: ${{ matrix.plugin_id }} ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: discover
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Update go.mod replace path
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"
          sed -i.bak "s|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${WORKSPACE}/CLIProxyAPI|" go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin web assets
        working-directory: plugins/${{ matrix.plugin_id }}
        shell: bash
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm run build
          else
            echo "no web/package.json for ${{ matrix.plugin_id }}, skipping web build"
          fi

      - name: Build plugin
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') && 'clang' || '' }}
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          OUTPUT="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          LDFLAGS="-X main.pluginVersion=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -buildmode=c-shared -ldflags="${LDFLAGS} -extldflags=-Wl,--export-all-symbols" -o "$OUTPUT" .
          else
            go build -buildmode=c-shared -ldflags="${LDFLAGS}" -o "$OUTPUT" .
          fi
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          LIB="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$ZIP_NAME" "$LIB"
          else
            zip -j "$ZIP_NAME" "$LIB"
          fi
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          else
            sha256sum "$ZIP_NAME" >> checksums_fragment.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin_id }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ matrix.plugin_id }}/go/*.zip
            plugins/${{ matrix.plugin_id }}/go/checksums_fragment.txt

  release:
    name: Assemble Release ${{ needs.discover.outputs.plugin_id }} ${{ needs.discover.outputs.version }}
    runs-on: ubuntu-latest
    needs: [discover, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          wc -l checksums.txt
          cat checksums.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.discover.outputs.plugin_id }} v${{ needs.discover.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            checksums.txt
