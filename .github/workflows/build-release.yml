name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PLUGIN_ID: developer-role-normalizer
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
            cc: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
            cc: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: dylib
            cc: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib
            cc: ""
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll
            cc: ""

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Update go.mod replace path
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          # Convert Windows backslashes to forward slashes for go.mod compatibility
          WORKSPACE="${WORKSPACE//\\//}"
          sed -i.bak "s|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${WORKSPACE}/CLIProxyAPI|" go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="${{ env.PLUGIN_ID }}-v${VERSION}.${{ matrix.ext }}"
          # Go 1.26 peCreateExportFile generates .def files that GNU ld 2.45+
          # (MinGW GCC 15.x) rejects. Using --export-all-symbols skips Go's
          # .def generation and lets mingw ld handle exports natively.
          # See https://github.com/golang/go/issues/78238
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -buildmode=c-shared -ldflags="-extldflags=-Wl,--export-all-symbols" -o "$OUTPUT" .
          else
            go build -buildmode=c-shared -o "$OUTPUT" .
          fi
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LIB="${{ env.PLUGIN_ID }}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${{ env.PLUGIN_ID }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$ZIP_NAME" "$LIB"
          else
            zip -j "$ZIP_NAME" "$LIB"
          fi
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          else
            sha256sum "$ZIP_NAME" >> checksums_fragment.txt
          fi
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ env.PLUGIN_ID }}/go/*.zip
            plugins/${{ env.PLUGIN_ID }}/go/checksums_fragment.txt

  release:
    name: Assemble Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          cat checksums.txt

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.zip
            checksums.txt
