# Tag format is v<version> (standard semver, e.g. v1.2.0).
# Before tagging, the plugin's version must be bumped in:
#   1. plugins/<id>/go/main.go   → var pluginVersion = "1.2.0"
#   2. registry.json             → "version": "1.2.0"
#   3. plugins/<id>/Makefile     → VERSION := 1.2.0 (if exists)
# The workflow reads var pluginVersion from each plugin's source and only
# builds plugins whose hardcoded version matches the tag version.
# A release contains only the matching plugins' platform zips + checksums.
# CPA uses GET .../releases/latest on registry.repository.

name: Build and Release Matching Plugins

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.list.outputs.version }}
      plugin_ids: ${{ steps.list.outputs.plugin_ids }}
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "invalid tag: $TAG (need v<version>, e.g. v1.2.0)" >&2
            exit 1
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+][0-9A-Za-z.-]+)?$'; then
            echo "invalid version in tag: $VERSION (need semver like 1.2.0)" >&2
            exit 1
          fi

          PLUGINS=$(find plugins -type f -path '*/go/go.mod' | sed 's|/go/go.mod$||;s|^plugins/||' | sort -u)
          if [ -z "$PLUGINS" ]; then
            echo "no plugins under plugins/*/go" >&2
            exit 1
          fi

          MATCHING_PLUGINS=""
          ALL_VERSIONS=""
          for pid in $PLUGINS; do
            pv=$(grep -oP 'var pluginVersion\s*=\s*"\K[^"]+' "plugins/${pid}/go/main.go" 2>/dev/null || echo '')
            if [ -z "$pv" ]; then
              echo "WARNING: cannot read version from plugins/${pid}/go/main.go" >&2
              continue
            fi
            ALL_VERSIONS="${ALL_VERSIONS}  ${pid}: ${pv}\n"
            if [ "$pv" = "$VERSION" ]; then
              MATCHING_PLUGINS="$MATCHING_PLUGINS $pid"
            fi
          done

          MATCHING_PLUGINS=$(echo "$MATCHING_PLUGINS" | xargs -n1 | sort -u | xargs)
          if [ -z "$MATCHING_PLUGINS" ]; then
            echo "no plugin has version $VERSION in source" >&2
            echo "available plugin versions:" >&2
            printf "%b" "$ALL_VERSIONS" >&2
            exit 1
          fi

          echo "tag version: $VERSION"
          echo "matching plugins: $MATCHING_PLUGINS"
          printf "%b" "$ALL_VERSIONS"

          # Build matrix: matching plugins × 6 platforms
          ENTRIES=""
          for pid in $MATCHING_PLUGINS; do
            for pair in "linux:amd64:ubuntu-latest:so" "linux:arm64:ubuntu-24.04-arm:so" "darwin:amd64:macos-latest:dylib" "darwin:arm64:macos-latest:dylib" "windows:amd64:windows-latest:dll" "windows:arm64:windows-11-arm:dll"; do
              IFS=':' read -r goos goarch runner ext <<< "$pair"
              ENTRIES="${ENTRIES}{\"plugin_id\":\"$pid\",\"goos\":\"$goos\",\"goarch\":\"$goarch\",\"runner\":\"$runner\",\"ext\":\"$ext\"},"
            done
          done
          ENTRIES="${ENTRIES%,}"
          MATRIX="{\"include\":[$ENTRIES]}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_ids=$MATCHING_PLUGINS" >> "$GITHUB_OUTPUT"
          {
            echo 'matrix<<MATRIX_EOF'
            echo "$MATRIX"
            echo 'MATRIX_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "jobs: $(echo "$MATRIX" | jq '.include | length')"

  build:
    name: ${{ matrix.plugin_id }} ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: discover
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Update go.mod replace path
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"
          sed -i.bak "s|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${WORKSPACE}/CLIProxyAPI|" go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin web assets
        working-directory: plugins/${{ matrix.plugin_id }}
        shell: bash
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm run build
          else
            echo "no web/package.json for ${{ matrix.plugin_id }}, skipping web build"
          fi

      - name: Build plugin
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') && 'clang' || '' }}
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          OUTPUT="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          LDFLAGS="-X main.pluginVersion=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -buildmode=c-shared -ldflags="${LDFLAGS} -extldflags=-Wl,--export-all-symbols" -o "$OUTPUT" .
          else
            go build -buildmode=c-shared -ldflags="${LDFLAGS}" -o "$OUTPUT" .
          fi
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          LIB="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$ZIP_NAME" "$LIB"
          else
            zip -j "$ZIP_NAME" "$LIB"
          fi
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          else
            sha256sum "$ZIP_NAME" >> checksums_fragment.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin_id }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ matrix.plugin_id }}/go/*.zip
            plugins/${{ matrix.plugin_id }}/go/checksums_fragment.txt

  release:
    name: Release v${{ needs.discover.outputs.version }}
    runs-on: ubuntu-latest
    needs: [discover, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          wc -l checksums.txt
          cat checksums.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            checksums.txt
