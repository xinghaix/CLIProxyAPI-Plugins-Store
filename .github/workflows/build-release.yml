name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PLUGIN_ID: developer-role-normalizer
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: so
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            ext: dll

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compiler (linux/arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install mingw (windows)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64-win32

      - name: Update go.mod replace path
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        run: |
          sed -i.bak 's|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${{ github.workspace }}/CLIProxyAPI|' go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ (matrix.goos == 'linux' && matrix.goarch == 'arm64') && 'aarch64-linux-gnu-gcc' || (matrix.goos == 'windows') && 'x86_64-w64-mingw32-gcc' || '' }}
          CXX: ${{ (matrix.goos == 'linux' && matrix.goarch == 'arm64') && 'aarch64-linux-gnu-g++' || (matrix.goos == 'windows') && 'x86_64-w64-mingw32-g++' || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="${{ env.PLUGIN_ID }}-v${VERSION}.${{ matrix.ext }}"
          go build -buildmode=c-shared -o "$OUTPUT" .
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ env.PLUGIN_ID }}/go
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LIB="${{ env.PLUGIN_ID }}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${{ env.PLUGIN_ID }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          zip -j "$ZIP_NAME" "$LIB"
          shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ env.PLUGIN_ID }}/go/*.zip
            plugins/${{ env.PLUGIN_ID }}/go/checksums_fragment.txt

  release:
    name: Assemble Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          cat checksums.txt

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.zip
            checksums.txt
