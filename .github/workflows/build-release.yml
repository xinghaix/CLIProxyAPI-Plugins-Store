# CPA plugin store: one GitHub Release per semver tag (e.g. v0.1.0).
# All plugins under plugins/*/go are built; all zips + checksums.txt go on that release.
# CPA uses GET .../releases/latest on registry.repository and selects
#   <plugin-id>_<version>_<goos>_<goarch>.zip from release assets.

name: Build and Release Plugins

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.list.outputs.version }}
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9][0-9A-Za-z.+-]*$'; then
            echo "invalid tag for CPA plugin store: $TAG (need v0.1.0 style)" >&2
            exit 1
          fi
          mapfile -t PLUGINS < <(find plugins -mindepth 2 -maxdepth 2 -type f -name go.mod | sed 's|/go/go.mod$||;s|.*/plugins/||' | sort -u)
          if [ "${#PLUGINS[@]}" -eq 0 ]; then
            echo "no plugins under plugins/*/go" >&2
            exit 1
          fi
          MATRIX='['
          first=1
          add() {
            local pid="$1" goos="$2" goarch="$3" runner="$4" ext="$5"
            if [ "$first" -eq 0 ]; then MATRIX+=','; fi
            first=0
            MATRIX+=$(jq -nc --arg pid "$pid" --arg goos "$goos" --arg goarch "$goarch" --arg runner "$runner" --arg ext "$ext" \
              '{plugin_id:$pid,goos:$goos,goarch:$goarch,runner:$runner,ext:$ext}')
          }
          for pid in "${PLUGINS[@]}"; do
            add "$pid" linux amd64 ubuntu-latest so
            add "$pid" linux arm64 ubuntu-24.04-arm so
            add "$pid" darwin amd64 macos-latest dylib
            add "$pid" darwin arm64 macos-latest dylib
            add "$pid" windows amd64 windows-latest dll
            add "$pid" windows arm64 windows-11-arm dll
          done
          MATRIX+=']'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugins: ${PLUGINS[*]} version $VERSION jobs: $(echo "$MATRIX" | jq length)"

  build:
    name: ${{ matrix.plugin_id }} ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: discover
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout plugin store
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI for replace directive
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: CLIProxyAPI
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Update go.mod replace path
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"
          sed -i.bak "s|replace github.com/router-for-me/CLIProxyAPI/v7 => .*|replace github.com/router-for-me/CLIProxyAPI/v7 => ${WORKSPACE}/CLIProxyAPI|" go.mod
          rm -f go.mod.bak
          go mod tidy

      - name: Build plugin
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') && 'clang' || '' }}
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          OUTPUT="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -buildmode=c-shared -ldflags="-extldflags=-Wl,--export-all-symbols" -o "$OUTPUT" .
          else
            go build -buildmode=c-shared -o "$OUTPUT" .
          fi
          file "$OUTPUT" || true

      - name: Package zip
        working-directory: plugins/${{ matrix.plugin_id }}/go
        shell: bash
        run: |
          PLUGIN_ID="${{ matrix.plugin_id }}"
          VERSION="${{ needs.discover.outputs.version }}"
          LIB="${PLUGIN_ID}-v${VERSION}.${{ matrix.ext }}"
          ZIP_NAME="${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          rm -f "$ZIP_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$ZIP_NAME" "$LIB"
          else
            zip -j "$ZIP_NAME" "$LIB"
          fi
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ZIP_NAME" >> checksums_fragment.txt
          else
            sha256sum "$ZIP_NAME" >> checksums_fragment.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin_id }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            plugins/${{ matrix.plugin_id }}/go/*.zip
            plugins/${{ matrix.plugin_id }}/go/checksums_fragment.txt

  release:
    name: Assemble Release ${{ needs.discover.outputs.version }}
    runs-on: ubuntu-latest
    needs: [discover, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name 'checksums_fragment.txt' -exec cat {} \; | sort -u > checksums.txt
          wc -l checksums.txt
          cat checksums.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            checksums.txt