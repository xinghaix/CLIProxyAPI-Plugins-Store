<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPA Manager Plus</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a2332; --border:#2d3a4f; --text:#e7ecf3; --muted:#8b9cb3; --accent:#3b82f6; --tab-active:#2563eb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    header h1 { margin:0; font-size:1.1rem; }
    .status { font-size:0.85rem; color:var(--muted); }
    .status.ok { color:#4ade80; } .status.err { color:#f87171; }
    nav.tabs { display:flex; gap:4px; padding:10px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    nav.tabs button { background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px 14px; border-radius:8px; cursor:pointer; }
    nav.tabs button.active { background:var(--tab-active); border-color:var(--tab-active); color:#fff; }
    main { padding:16px 20px; }
    .panel { display:none; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; min-height:280px; }
    .panel.active { display:block; }
    pre.out { background:#0b1020; padding:12px; border-radius:8px; overflow:auto; max-height:70vh; font-size:12px; white-space:pre-wrap; }
    .hint { color:var(--muted); font-size:0.85rem; margin-bottom:12px; line-height:1.5; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .row button { background:var(--accent); color:#fff; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>
  <header><h1>CPA Manager Plus</h1><span id="health" class="status">检测 Manager…</span></header>
  <nav class="tabs">
    <button type="button" class="active" data-tab="dashboard">仪表盘</button>
    <button type="button" data-tab="usage">用量分析</button>
    <button type="button" data-tab="monitoring">请求监控</button>
    <button type="button" data-tab="inspection">账号巡检</button>
    <button type="button" data-tab="config">配置</button>
  </nav>
  <main>
    <section class="panel active" data-tab="dashboard">
      <p class="hint">经插件反向代理访问 Manager Server（默认 :18317）。</p>
      <div class="row"><button type="button" id="btn-dashboard">dashboard/summary</button></div>
      <pre class="out" id="out-dashboard">点击加载</pre>
    </section>
    <section class="panel" data-tab="usage">
      <p class="hint">用量相关 API 走同源 /v0/management/cpa-manager-plus/proxy。</p>
      <div class="row">
        <button type="button" id="btn-usage-info">usage-service/info</button>
        <button type="button" id="btn-usage-mgmt">management/usage</button>
      </div>
      <pre class="out" id="out-usage">点击加载</pre>
    </section>
    <section class="panel" data-tab="monitoring">
      <div class="row">
        <button type="button" id="btn-mon-headers">header-snapshots</button>
        <button type="button" id="btn-mon-analytics">analytics</button>
      </div>
      <pre class="out" id="out-monitoring">点击加载</pre>
    </section>
    <section class="panel" data-tab="inspection">
      <div class="row"><button type="button" id="btn-inspection">codex-inspection/runs</button></div>
      <pre class="out" id="out-inspection">点击加载</pre>
    </section>
    <section class="panel" data-tab="config">
      <p class="hint">插件配置 manager_base_url、admin_key。请求需带管理端 Authorization。</p>
      <div class="row"><button type="button" id="btn-config">usage-service/config</button></div>
      <pre class="out" id="out-config">点击加载</pre>
    </section>
  </main>
  <script>
(function(){
  const PROXY='/v0/management/cpa-manager-plus/proxy';
  document.querySelectorAll('nav.tabs button').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b===btn));
      document.querySelectorAll('main .panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===btn.dataset.tab));
    };
  });
  function authHeaders(){
    const h={'Content-Type':'application/json',Accept:'application/json'};
    try{
      const k=sessionStorage.getItem('cpa_mgmt_key')||localStorage.getItem('cpa_mgmt_key');
      if(k) h.Authorization=k.startsWith('Bearer ')?k:'Bearer '+k;
    }catch(_){}
    return h;
  }
  async function proxyCall(payload){
    const res=await fetch(PROXY,{method:'POST',headers:authHeaders(),body:JSON.stringify(payload)});
    const text=await res.text();
    let body; try{body=JSON.parse(text);}catch{body=text;}
    return {status:res.status,body};
  }
  function show(id,data){const el=document.getElementById(id);if(el)el.textContent=typeof data==='string'?data:JSON.stringify(data,null,2);}
  async function checkHealth(){
    const el=document.getElementById('health');
    try{
      const r=await fetch('/v0/management/cpa-manager-plus/health',{headers:authHeaders()});
      const j=await r.json();
      if(r.ok&&j.ok){el.textContent='Manager 可达 @ '+(j.manager_base_url||'');el.className='status ok';}
      else{el.textContent=j.error||'不可用';el.className='status err';}
    }catch(e){el.textContent='失败: '+e.message;el.className='status err';}
  }
  document.getElementById('btn-dashboard').onclick=async()=>{
    const start=new Date();start.setHours(0,0,0,0);
    show('out-dashboard',await proxyCall({method:'GET',path:'/v0/management/dashboard/summary',query:'today_start_ms='+start.getTime()}));
  };
  document.getElementById('btn-usage-info').onclick=async()=>show('out-usage',await proxyCall({method:'GET',path:'/usage-service/info'}));
  document.getElementById('btn-usage-mgmt').onclick=async()=>show('out-usage',await proxyCall({method:'GET',path:'/v0/management/usage'}));
  document.getElementById('btn-mon-headers').onclick=async()=>show('out-monitoring',await proxyCall({method:'GET',path:'/v0/management/monitoring/header-snapshots'}));
  document.getElementById('btn-mon-analytics').onclick=async()=>show('out-monitoring',await proxyCall({method:'GET',path:'/v0/management/monitoring/analytics'}));
  document.getElementById('btn-inspection').onclick=async()=>show('out-inspection',await proxyCall({method:'GET',path:'/v0/management/codex-inspection/runs'}));
  document.getElementById('btn-config').onclick=async()=>show('out-config',await proxyCall({method:'GET',path:'/usage-service/config'}));
  checkHealth();
})();
  </script>
</body>
</html>
